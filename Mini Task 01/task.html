<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero</title>
    <link rel="stylesheet" href="task.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
        <!-- Header -->
    <header>
            <!-- Logo -->
        <div class="logo">
            <img src="./Images/nikatam-logo.png" alt="NikatamLogo">
        </div>
            <!-- Hamburger button -->
        <button class="hamberger">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </button>
    </header>
    <main>
        <section class="hero-container">
            <div class="hero-left">
                <p class="tagline">~ HYPERLOCAL PLATFORM</p>
                <h1>JO Chaiye,<br>Vo Nikatam.</h1>
                <div class="description">Nikatam connects you with the best local shops and services in your neighborhood. 
                Discover the magic of local commerce.</div>
                <button>Get Started</button>
            </div>
            <div class="hero-right">
                <div class="taau-img">
                    <img src="./Images/nikku-taau.png" alt="Hero Image">
                </div>
                <div class="nav-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
